<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界史マップ - 歴史の地図帳</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'メイリオ', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
    }

    /* ヘッダー */
    #header {
      background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #e94560;
      height: 56px;
      z-index: 1000;
      position: relative;
    }

    #header h1 {
      font-size: 1.3rem;
      color: #fff;
      letter-spacing: 2px;
    }

    #header h1 span {
      color: #e94560;
    }

    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    /* 時代フィルター */
    .era-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .era-btn {
      padding: 4px 12px;
      border: 1px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 16px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .era-btn:hover, .era-btn.active {
      background: #e94560;
      color: #fff;
    }

    /* カテゴリフィルター */
    .category-filters {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .cat-btn {
      padding: 3px 8px;
      border: 1px solid;
      background: transparent;
      border-radius: 12px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0.6;
      white-space: nowrap;
    }

    .cat-btn:hover, .cat-btn.active {
      opacity: 1;
    }

    /* メインレイアウト */
    #main {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* 地図 */
    #map {
      flex: 1;
      height: 100%;
    }

    /* サイドパネル */
    #sidebar {
      width: 420px;
      background: #16213e;
      border-left: 2px solid #0f3460;
      overflow-y: auto;
      transition: transform 0.3s ease;
      position: relative;
    }

    #sidebar.collapsed {
      transform: translateX(420px);
      width: 0;
      border: none;
    }

    #sidebar-toggle {
      position: absolute;
      left: -36px;
      top: 12px;
      width: 36px;
      height: 36px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-right: none;
      color: #e0e0e0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px 0 0 6px;
      font-size: 1.1rem;
      z-index: 500;
    }

    .sidebar-content {
      padding: 20px;
    }

    /* 初期メッセージ */
    .welcome-msg {
      text-align: center;
      padding: 60px 20px;
      color: #8899aa;
    }

    .welcome-msg h2 {
      font-size: 1.3rem;
      margin-bottom: 16px;
      color: #e94560;
    }

    .welcome-msg p {
      font-size: 0.9rem;
      line-height: 1.8;
    }

    /* イベント詳細 */
    .event-detail {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .event-header {
      border-bottom: 2px solid #e94560;
      padding-bottom: 16px;
      margin-bottom: 16px;
    }

    .event-category {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .event-title {
      font-size: 1.4rem;
      color: #fff;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .event-year {
      font-size: 1.1rem;
      color: #e94560;
      font-weight: bold;
    }

    .event-region {
      font-size: 0.85rem;
      color: #8899aa;
      margin-top: 4px;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section h3 {
      font-size: 0.9rem;
      color: #e94560;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .detail-section h3::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 14px;
      background: #e94560;
      border-radius: 2px;
    }

    .detail-section p {
      font-size: 0.88rem;
      line-height: 1.8;
      color: #c0c8d4;
    }

    .terrain-box {
      background: rgba(14, 52, 96, 0.5);
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 14px;
    }

    .terrain-box p {
      font-size: 0.85rem;
    }

    .significance-box {
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 8px;
      padding: 14px;
    }

    .significance-box p {
      font-size: 0.85rem;
    }

    /* タイムライン（下部） */
    #timeline {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 420px;
      height: 80px;
      background: linear-gradient(to top, rgba(22, 33, 62, 0.97), rgba(22, 33, 62, 0.85));
      border-top: 1px solid #0f3460;
      z-index: 800;
      display: flex;
      flex-direction: column;
      padding: 6px 16px;
      transition: right 0.3s ease;
    }

    #timeline.expanded {
      right: 0;
    }

    .timeline-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #8899aa;
      padding: 0 4px;
    }

    .timeline-slider-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .timeline-slider-wrap label {
      font-size: 0.75rem;
      color: #e94560;
      white-space: nowrap;
      min-width: 100px;
    }

    #timeline-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: #0f3460;
      border-radius: 3px;
      outline: none;
    }

    #timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #e94560;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(233, 69, 96, 0.5);
    }

    .timeline-dots {
      position: relative;
      height: 20px;
      margin: 0 4px;
    }

    .timeline-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      transition: all 0.2s;
      opacity: 0.7;
    }

    .timeline-dot:hover {
      transform: translate(-50%, -50%) scale(1.6);
      opacity: 1;
    }

    .timeline-dot.active {
      transform: translate(-50%, -50%) scale(1.8);
      opacity: 1;
      box-shadow: 0 0 8px currentColor;
    }

    /* 検索ボックス */
    #search-box {
      padding: 6px 14px;
      border: 1px solid #0f3460;
      background: #1a1a2e;
      color: #e0e0e0;
      border-radius: 20px;
      font-size: 0.85rem;
      width: 200px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search-box:focus {
      border-color: #e94560;
    }

    #search-box::placeholder {
      color: #556677;
    }

    /* イベントリスト（サイドバー内） */
    .event-list {
      margin-top: 16px;
    }

    .event-list-item {
      padding: 12px;
      border: 1px solid #0f3460;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(15, 52, 96, 0.3);
    }

    .event-list-item:hover {
      background: rgba(233, 69, 96, 0.15);
      border-color: #e94560;
    }

    .event-list-item .item-year {
      font-size: 0.75rem;
      color: #e94560;
      font-weight: bold;
    }

    .event-list-item .item-title {
      font-size: 0.9rem;
      color: #fff;
      margin-top: 2px;
    }

    .event-list-item .item-region {
      font-size: 0.75rem;
      color: #8899aa;
      margin-top: 2px;
    }

    /* Leafletカスタム */
    .custom-marker {
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .custom-marker:hover {
      transform: scale(1.3);
    }

    .custom-marker.active {
      transform: scale(1.4);
      box-shadow: 0 0 16px rgba(233, 69, 96, 0.8);
    }

    .leaflet-popup-content-wrapper {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #e94560;
      border-radius: 8px;
    }

    .leaflet-popup-tip {
      background: #16213e;
      border: 1px solid #e94560;
    }

    .leaflet-popup-content {
      margin: 10px 14px;
      font-size: 0.85rem;
    }

    .popup-title {
      font-weight: bold;
      color: #fff;
      margin-bottom: 4px;
    }

    .popup-year {
      color: #e94560;
      font-size: 0.8rem;
    }

    /* スクロールバー */
    #sidebar::-webkit-scrollbar {
      width: 6px;
    }

    #sidebar::-webkit-scrollbar-track {
      background: #16213e;
    }

    #sidebar::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 3px;
    }

    #sidebar::-webkit-scrollbar-thumb:hover {
      background: #e94560;
    }

    /* レスポンシブ */
    @media (max-width: 768px) {
      #sidebar {
        position: absolute;
        right: 0;
        top: 56px;
        height: calc(100vh - 56px);
        z-index: 900;
        width: 100%;
      }

      #sidebar.collapsed {
        transform: translateX(100%);
      }

      #timeline {
        right: 0;
      }

      .era-filters {
        display: none;
      }

      .category-filters {
        display: none;
      }

      #search-box {
        width: 140px;
      }
    }

    /* 地域別リストのタブ */
    .list-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .list-tab {
      padding: 4px 10px;
      background: transparent;
      border: 1px solid #0f3460;
      color: #8899aa;
      border-radius: 14px;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .list-tab:hover, .list-tab.active {
      background: #0f3460;
      color: #fff;
      border-color: #e94560;
    }

    /* 近隣イベント */
    .nearby-events {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #0f3460;
    }

    .nearby-events h3 {
      font-size: 0.85rem;
      color: #8899aa;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div id="header">
    <h1><a href="/" style="color:inherit;text-decoration:none;"><span>&#x1F30D;</span> 世界史マップ <span style="font-size:0.7rem; opacity:0.7">- History Atlas</span></a></h1>
    <div class="header-controls">
      <input type="text" id="search-box" placeholder="イベントを検索...">
      <div class="era-filters" id="era-filters"></div>
    </div>
  </div>

  <div id="main">
    <div id="map"></div>
    <div id="sidebar">
      <button id="sidebar-toggle">◀</button>
      <div class="sidebar-content" id="sidebar-content">
        <div class="welcome-msg" id="welcome">
          <h2>世界史マップへようこそ</h2>
          <p>
            地図上のマーカーをクリックすると、<br>
            その場所で起きた歴史的事件の詳細が表示されます。<br><br>
            上部のフィルターで時代やカテゴリを絞り込んだり、<br>
            下部のタイムラインで年代を指定できます。<br><br>
            各事件の<strong>地形・地理的特徴</strong>と<br>
            <strong>歴史的重要性</strong>も詳しく解説しています。
          </p>
        </div>
      </div>
    </div>
  </div>

  <div id="timeline">
    <div class="timeline-slider-wrap">
      <label id="timeline-label">全時代</label>
      <input type="range" id="timeline-slider" min="-3500" max="2025" value="-3500" step="1">
      <label id="timeline-value" style="text-align:right">紀元前3500年〜</label>
    </div>
    <div class="timeline-dots" id="timeline-dots"></div>
    <div class="timeline-labels">
      <span>紀元前3500年</span>
      <span>紀元前1000年</span>
      <span>紀元1年</span>
      <span>500年</span>
      <span>1000年</span>
      <span>1500年</span>
      <span>2000年</span>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script>
    // ===== 地図初期化 =====
    const map = L.map('map', {
      center: [30, 30],
      zoom: 3,
      minZoom: 2,
      maxZoom: 12,
      zoomControl: true,
      worldCopyJump: true
    });

    // ダークテーマのタイルレイヤー
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    // ===== 状態管理 =====
    let markers = [];
    let activeEvent = null;
    let activeEras = new Set();
    let activeCategories = new Set();
    let searchQuery = '';
    let timelineYear = -3500;
    let sidebarCollapsed = false;

    // ===== マーカー作成 =====
    function createMarker(event) {
      const color = categoryColors[event.category] || '#e94560';
      const size = 14;

      const icon = L.divIcon({
        className: 'custom-marker',
        html: '',
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
        popupAnchor: [0, -size/2]
      });

      const marker = L.marker([event.lat, event.lng], { icon })
        .addTo(map);

      // マーカーのスタイル設定
      const el = marker.getElement();
      if (el) {
        el.style.backgroundColor = color;
        el.style.borderColor = '#fff';
      }

      // ポップアップ
      marker.bindPopup(`
        <div class="popup-title">${event.title}</div>
        <div class="popup-year">${event.yearDisplay}</div>
      `, { closeButton: false, offset: [0, -4] });

      marker.on('mouseover', function() {
        this.openPopup();
      });

      marker.on('mouseout', function() {
        this.closePopup();
      });

      marker.on('click', function() {
        showEventDetail(event);
        highlightMarker(event.id);
      });

      return { marker, event };
    }

    // ===== マーカー描画 =====
    function renderMarkers() {
      // 既存マーカー削除
      markers.forEach(m => map.removeLayer(m.marker));
      markers = [];

      const filtered = getFilteredEvents();

      filtered.forEach(event => {
        markers.push(createMarker(event));
      });

      renderTimelineDots(filtered);
    }

    // ===== フィルタリング =====
    function getFilteredEvents() {
      return historicalEvents.filter(event => {
        // 時代フィルター
        if (activeEras.size > 0) {
          const matchEra = [...activeEras].some(eraIdx => {
            const era = eras[eraIdx];
            return event.year >= era.min && event.year < era.max;
          });
          if (!matchEra) return false;
        }

        // カテゴリフィルター
        if (activeCategories.size > 0) {
          if (!activeCategories.has(event.category)) return false;
        }

        // 検索フィルター
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          const searchTarget = (event.title + event.description + event.region + event.significance).toLowerCase();
          if (!searchTarget.includes(q)) return false;
        }

        // タイムラインフィルター
        if (timelineYear > -3500) {
          if (event.year > timelineYear + 50 || event.year < timelineYear - 50) return false;
        }

        return true;
      });
    }

    // ===== マーカーハイライト =====
    function highlightMarker(eventId) {
      markers.forEach(m => {
        const el = m.marker.getElement();
        if (el) {
          if (m.event.id === eventId) {
            el.classList.add('active');
          } else {
            el.classList.remove('active');
          }
        }
      });

      // タイムラインドットのハイライト
      document.querySelectorAll('.timeline-dot').forEach(dot => {
        if (parseInt(dot.dataset.id) === eventId) {
          dot.classList.add('active');
        } else {
          dot.classList.remove('active');
        }
      });
    }

    // ===== イベント詳細表示 =====
    function showEventDetail(event) {
      activeEvent = event;
      const color = categoryColors[event.category] || '#e94560';

      // サイドバーを開く
      if (sidebarCollapsed) {
        toggleSidebar();
      }

      // 近隣イベントを探す
      const nearbyEvents = historicalEvents
        .filter(e => e.id !== event.id)
        .map(e => ({
          ...e,
          distance: Math.sqrt(Math.pow(e.lat - event.lat, 2) + Math.pow(e.lng - event.lng, 2))
        }))
        .sort((a, b) => a.distance - b.distance)
        .slice(0, 5);

      const sidebarContent = document.getElementById('sidebar-content');
      sidebarContent.innerHTML = `
        <div class="event-detail">
          <div class="event-header">
            <span class="event-category" style="background:${color}; color:#fff">${event.category}</span>
            <h2 class="event-title">${event.title}</h2>
            <div class="event-year">${event.yearDisplay}</div>
            <div class="event-region">${event.region}</div>
          </div>

          <div class="detail-section">
            <h3>概要</h3>
            <p>${event.description}</p>
          </div>

          <div class="detail-section">
            <h3>地形・地理的特徴</h3>
            <div class="terrain-box">
              <p>${event.terrain}</p>
            </div>
          </div>

          <div class="detail-section">
            <h3>歴史的重要性</h3>
            <div class="significance-box">
              <p>${event.significance}</p>
            </div>
          </div>

          <div style="margin: 16px 0;">
            <a href="/events/${event.id}/" style="display:block;text-align:center;padding:10px 16px;background:#e94560;color:#fff;border-radius:8px;text-decoration:none;font-weight:bold;font-size:0.9rem;">&#x1F4D6; 詳しく読む</a>
          </div>

          <div class="nearby-events">
            <h3>地理的に近い出来事</h3>
            <div class="event-list">
              ${nearbyEvents.map(ne => `
                <div class="event-list-item" onclick="focusEvent(${ne.id})">
                  <div class="item-year">${ne.yearDisplay}</div>
                  <div class="item-title">${ne.title}</div>
                  <div class="item-region">${ne.region}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;

      // 地図を移動
      map.flyTo([event.lat, event.lng], Math.max(map.getZoom(), 5), {
        duration: 0.8
      });
    }

    // ===== イベントにフォーカス =====
    function focusEvent(eventId) {
      const event = historicalEvents.find(e => e.id === eventId);
      if (event) {
        showEventDetail(event);
        highlightMarker(eventId);
      }
    }

    // ===== サイドバー切り替え =====
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const timeline = document.getElementById('timeline');
      const toggle = document.getElementById('sidebar-toggle');

      sidebarCollapsed = !sidebarCollapsed;

      if (sidebarCollapsed) {
        sidebar.classList.add('collapsed');
        timeline.classList.add('expanded');
        toggle.textContent = '▶';
      } else {
        sidebar.classList.remove('collapsed');
        timeline.classList.remove('expanded');
        toggle.textContent = '◀';
      }

      setTimeout(() => map.invalidateSize(), 350);
    }

    // ===== 時代フィルターボタン =====
    function initEraFilters() {
      const container = document.getElementById('era-filters');
      eras.forEach((era, idx) => {
        const btn = document.createElement('button');
        btn.className = 'era-btn';
        btn.textContent = era.label;
        btn.addEventListener('click', () => {
          if (activeEras.has(idx)) {
            activeEras.delete(idx);
            btn.classList.remove('active');
          } else {
            activeEras.add(idx);
            btn.classList.add('active');
          }
          renderMarkers();
        });
        container.appendChild(btn);
      });
    }

    // ===== 検索 =====
    function initSearch() {
      const searchBox = document.getElementById('search-box');
      let timeout;
      searchBox.addEventListener('input', (e) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
          searchQuery = e.target.value;
          renderMarkers();

          // 検索結果をサイドバーに表示
          if (searchQuery) {
            showSearchResults();
          }
        }, 300);
      });
    }

    function showSearchResults() {
      const filtered = getFilteredEvents();
      const sidebarContent = document.getElementById('sidebar-content');

      sidebarContent.innerHTML = `
        <div style="margin-bottom:12px;">
          <h3 style="color:#e94560; font-size:0.95rem;">検索結果: ${filtered.length}件</h3>
        </div>
        <div class="event-list">
          ${filtered.map(e => `
            <div class="event-list-item" onclick="focusEvent(${e.id})">
              <div class="item-year">${e.yearDisplay}</div>
              <div class="item-title">${e.title}</div>
              <div class="item-region">${e.region}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // ===== タイムライン =====
    function initTimeline() {
      const slider = document.getElementById('timeline-slider');
      const label = document.getElementById('timeline-label');
      const valueLabel = document.getElementById('timeline-value');

      slider.addEventListener('input', (e) => {
        timelineYear = parseInt(e.target.value);

        if (timelineYear <= -3490) {
          label.textContent = '全時代';
          valueLabel.textContent = '全時代表示';
          timelineYear = -3500;
        } else if (timelineYear < 0) {
          label.textContent = `紀元前${Math.abs(timelineYear)}年付近`;
          valueLabel.textContent = `±50年の範囲`;
        } else {
          label.textContent = `${timelineYear}年付近`;
          valueLabel.textContent = `±50年の範囲`;
        }

        renderMarkers();
      });
    }

    function renderTimelineDots(events) {
      const container = document.getElementById('timeline-dots');
      container.innerHTML = '';

      const minYear = -3500;
      const maxYear = 2025;
      const range = maxYear - minYear;

      events.forEach(event => {
        const dot = document.createElement('div');
        dot.className = 'timeline-dot';
        dot.dataset.id = event.id;

        const pos = ((event.year - minYear) / range) * 100;
        dot.style.left = `${pos}%`;
        dot.style.backgroundColor = categoryColors[event.category] || '#e94560';

        dot.title = `${event.yearDisplay}: ${event.title}`;

        dot.addEventListener('click', () => {
          focusEvent(event.id);
        });

        container.appendChild(dot);
      });
    }

    // ===== URLパラメータ処理 =====
    function handleUrlParams() {
      const params = new URLSearchParams(window.location.search);
      if (params.has('event')) {
        const eventId = parseInt(params.get('event'));
        const event = historicalEvents.find(e => e.id === eventId);
        if (event) {
          setTimeout(() => {
            showEventDetail(event);
            highlightMarker(eventId);
          }, 500);
        }
      }
      if (params.has('lat') && params.has('lng')) {
        const lat = parseFloat(params.get('lat'));
        const lng = parseFloat(params.get('lng'));
        const zoom = parseInt(params.get('zoom') || '6');
        map.setView([lat, lng], zoom);
      }
    }

    // ===== 初期化 =====
    function init() {
      initEraFilters();
      initSearch();
      initTimeline();
      renderMarkers();

      document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
      handleUrlParams();
    }

    init();
  </script>
</body>
</html>
